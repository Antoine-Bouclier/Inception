name: inception

services:

  nginx:

    container_name: nginx
    build:  ./requirements/nginx/
    ports:  
      - "443:443"
    networks:
      - inception_net
    volumes:
      -  wordpress_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    restart: always
    depends_on:
      wordpress:
        condition: service_healthy
        restart: true

  mariadb:

    container_name: mariadb
    build: ./requirements/mariadb/
    restart: always
    networks:
      - inception_net
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin status -u root -p$$(cat /run/secrets/db_root_password)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s

  wordpress:

    container_name: wordpress
    build:  ./requirements/wordpress
    networks:
      - inception_net
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    volumes:
      - wordpress_data:/var/www/html
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -ln 2>/dev/null | grep :9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true

# Global Network Definitions
networks:
  inception_net:
    driver: bridge

# Global Volume Definitions (Persistent Storage)
volumes:
  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abouclie/data/wordpress # Path required by the subject
  mariadb_data:
    name: mariadb_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/abouclie/data/mariadb

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
