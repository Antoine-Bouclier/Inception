server
{
	# SSL/TLS Configuration
	# ssl ensures that all data entering the server is encrypted.
	listen		443 ssl;
	listen		[::]:443 ssl;

	# Domain name
	server_name	abouclie.42.fr;

	# Define the versions of the security protocol
	# TLS stand for Transport Layer Security
	ssl_protocols		TLSv1.2 TLSv1.3;

	# ssl_certificate: Public identity of the server sent to the client
	ssl_certificate		/etc/nginx/ssl/inception.crt;

	# ssl_certificate_key: Private key used to decrypt messages sent by clients
	ssl_certificate_key	/etc/nginx/ssl/inception.key;

	# Root directory and index files
	root		/var/www/html;
	index		index.php index.html index.htm;

	# Standard rule for path resolution
	location /
	{
		try_files	$uri $uri/ =404;
	}

	# Pass PHP scripts to the WordPress container via FastCGI
	# location ~ \.php$
	# {
	# 	include snippets/fastcgi-php.conf;
	#	# 'wordpress' refers to the container name in the docker-compose.yml
	#	fastcgi_pass wordpress:9000;
	# }
}
